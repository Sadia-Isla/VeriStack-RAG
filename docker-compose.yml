services:
  # The Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: veristack-db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - rag-network

  # The FastAPI Backend
  api:
    build: .
    container_name: veristack-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge
